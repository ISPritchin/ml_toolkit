# Демонстрационный пресет возможностей сегментации (см. CLAUDE.md -> Segmentation).
#
# `segments:` - зарезервированный ключ верхнего уровня (не имя трансформера):
# именованные конфиги сегментации, на которые трансформеры ссылаются через
# ключ `segment` (строка-имя отсюда, или inline-словарь той же формы прямо
# в params трансформера). Именованные конфиги никуда не "текут" за пределы
# этого файла - если preset передаётся как отдельная группа feature_spec,
# секция `segments:` должна быть у каждого файла/словаря, который на неё ссылается.
#
# Здесь названы все три доступные стратегии (zero_gap/relative_gap/mask), но
# реально применена к трансформеру только одна (short_gap) - остальные две
# оставлены как справочные примеры синтаксиса, ничего не вычисляют, пока на
# них никто не ссылается ключом `segment`.
segments:
  short_gap:                 # 2+ подряд нулевых месяца - разрыв. Ведущие нули
    strategy: zero_gap       # (до первого ненулевого значения сущности) в grace
    gap_threshold: 2         # period НЕ попадают - исключаются целиком, ряд ещё
                             # не начался (не зависит от gap_threshold).
  soft_drop:                 # падение сильно ниже своего недавнего уровня
    strategy: relative_gap   # (не обязательно до нуля) - разрыв уже за 1 месяц
    gap_threshold: 1
    reference_window: 3
    relative_threshold: 0.3
  masked_activity:           # разрыв там, где внешняя колонка is_active=False
    strategy: mask
    gap_threshold: 1
    mask_column: is_active

rolling_sum:
  windows: [3]
  segment: short_gap         # строки внутри разрыва -> NaN вместо суммы

segment_gap:
  segment: short_gap         # индикатор: 1.0 внутри разрыва short_gap, иначе 0.0
