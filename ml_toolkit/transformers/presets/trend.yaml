# Пресет: динамика и направление изменений.
# Задачи: пропенсити-модели, классификация роста/падения, churn с акцентом на тренд.
# Глубина истории: до 24 месяцев.

# ── Линейный тренд ───────────────────────────────────────────
slope:
  windows: [3, 6, 12]

slope_ratio:
  pairs:
    - [3, 6]
    - [6, 12]

log_slope:
  windows: [6, 12]

log_slope_ratio:
  pairs:
    - [6, 12]

# ── Ускорение и разворот ─────────────────────────────────────
accel: {}

trend_flip:
  lag_window_pairs:
    - [6, 6]
    - [12, 12]

# ── Моментум ─────────────────────────────────────────────────
momentum:
  half_windows: [3, 6]

time_weighted_momentum:
  windows: [6, 12]

direction_flag:
  windows: [3, 6, 12]

# ── Сглаженный уровень ───────────────────────────────────────
ewma:
  alphas: [0.2, 0.5]

lag1_diff: {}

growth_since_start: {}

geometric_return:
  windows: [6, 12]
