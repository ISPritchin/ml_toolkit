# Расширенный пресет для модели чувствительности к скидке / предсказания размера скидки.
# Надстройка над discount_sensitivity.yaml: та же гипотеза "текущее состояние важнее
# всего", плюс качество/устойчивость тренда, память ряда, фазы жизненного цикла,
# резкие сдвиги уровня. ~53 колонки на product-колонку (~640 на 12 колонок) -
# примерно в 2.5 раза больше кандидатов Phase A, чем базовый пресет.
#
# Тот же принцип сегментации: НЕ сегментируем то, что само описывает паттерн
# активности/разрывов (recency/tenure/inactive_streak/activity_rate/zero_share/
# active_run_count) - там разрыв и есть сигнал. Сегментируем всё, что описывает
# динамику ЗНАЧЕНИЯ - там долгий нулевой разрыв исказил бы сигнал.

segments:
  short_gap:
    strategy: zero_gap
    gap_threshold: 3

# -----------------------------------------------------------------------------
# Текущее состояние / активность
# -----------------------------------------------------------------------------

segment_gap:
  segment: short_gap

recency: {}

tenure: {}

inactive_streak: {}

activity_rate: {}

zero_share:
  windows: [3, 12]

active_run_count:
  windows: [12]                # фрагментация активности: много коротких вспышек vs один long run

# -----------------------------------------------------------------------------
# Уровень / тренд / волатильность значения
# -----------------------------------------------------------------------------

log_level:
  windows: [3, 12]
  segment: short_gap

slope:
  windows: [3, 12]
  segment: short_gap

accel:
  segment: short_gap

growth_since_start:
  segment: short_gap

distance_to_global_max:
  segment: short_gap

cumulative_share:
  segment: short_gap           # доля текущей точки в накопленной сумме текущего сегмента активности

rolling_cv:
  windows: [3, 12]
  segment: short_gap

rolling_std:
  windows: [3, 12]
  segment: short_gap           # абсолютная волатильность рядом с нормированной CV - для
                                # предсказания РАЗМЕРА скидки масштаб может быть важен сам по себе

# -----------------------------------------------------------------------------
# Память / качество тренда / структурные сдвиги - новое относительно базового пресета
# -----------------------------------------------------------------------------

autocorr:
  segment: short_gap           # инерционность/предсказуемость динамики (лаги 1/2/3/6/12)

trend_consistency:
  windows: [12]
  segment: short_gap           # тренд - устойчивый сигнал или шум (R², clean_streak)

regime_change:
  windows: [12]
  segment: short_gap           # резкий сдвиг уровня - возможный маркер пересмотра условий

lifecycle_phase:
  windows: [12]
  segment: short_gap           # фаза (разгон/зрелость/спад) - разная фаза = разная позиция в переговорах

extreme_events:
  windows: [12]
  segment: short_gap           # заменяет extreme_share базового пресета: та же гипотеза
                                # "промо-driven всплески", но с разбивкой на всплеск/обвал/давность
