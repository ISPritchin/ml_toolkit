# Пресет для месячной гранулярности, глубина истории 2–3 года.
#
# Философия окон:
#   3  — квартал (короткий контекст / база для пар)
#   6  — полугодие
#  12  — год / сезонный период (главное окно для сезонных фич)
#  24  — 2 года
#  36  — 3 года (максимальная история)
#
# Пары: соседние периоды [6,12], [12,24], [24,36]
#   или короткий-к-длинному [3,12], [6,24], [12,36]

# ── simple statistics ────────────────────────────────────────
window_mean:
  windows: [3, 6, 12, 24, 36]

window_median:
  windows: [6, 12, 24]

# ── trend ────────────────────────────────────────────────────
slope:
  windows: [6, 12, 24, 36]

slope_ratio:
  pairs:
    - [6, 12]
    - [12, 24]
    - [24, 36]

momentum:
  half_windows: [3, 6, 12]

direction_flag:
  windows: [6, 12, 24]

max_abs_jump:
  windows: [6, 12, 24]

streak: {}

growth_since_start: {}

# ── volatility ───────────────────────────────────────────────
rolling_std:
  windows: [6, 12, 24, 36]

rolling_cv:
  windows: [6, 12, 24, 36]

rolling_min_max:
  windows: [6, 12, 24]

skew_proxy:
  windows: [6, 12, 24]

extreme_share:
  windows: [6, 12, 24]

# ── tenure / activity ────────────────────────────────────────
tenure: {}

recency: {}

inactive_streak: {}

active_months:
