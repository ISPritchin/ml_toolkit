# Пресет для модели чувствительности к скидке / предсказания размера скидки.
# 12 product-колонок, десятки миллионов строк -> набор сознательно минимальный:
# каждый трансформер добавлен под конкретную гипотезу, лишних окон/дублей нет.
# Итого ~20 выходных колонок на product-колонку (~240 кандидатов на 12 колонок) -
# select_features дальше прогонит через correlation filter, это не финальный набор,
# а осознанно узкий список кандидатов, чтобы не тратить compute на Phase A впустую.
#
# Сегментация: клиент считается отточенным по колонке, если 3 последовательных
# месяца подряд было 0 (zero_gap, gap_threshold=3). Подключена ТОЛЬКО к
# трансформерам уровня/тренда/волатильности значения - там долгий нулевой разрыв
# исказил бы сигнал (см. CLAUDE.md -> Segmentation). НЕ подключена к трансформерам
# активности (recency/tenure/inactive_streak/activity_rate/zero_share) - там сам
# разрыв и есть измеряемый сигнал, сегментация бы его стёрла.

segments:
  short_gap:
    strategy: zero_gap
    gap_threshold: 3   # 3 последовательных нулевых месяца подряд = отток

# -----------------------------------------------------------------------------
# Текущее состояние / активность - основная гипотеза (наибольший вес в этом пресете)
# -----------------------------------------------------------------------------

segment_gap:               # явный флаг "клиент прямо сейчас в оттоке" по этой колонке
  segment: short_gap

recency: {}                 # сколько месяцев назад была последняя активность (-1 = не было)

tenure: {}                  # стаж с первой активности + флаг самой первой точки

inactive_streak: {}         # текущая и исторически худшая серия простоя

activity_rate: {}           # доля активных месяцев с первой активности (общая "плотность")

zero_share:
  windows: [3, 12]          # недавняя (квартал) vs годовая плотность нулей - новый спад или хронический

# -----------------------------------------------------------------------------
# Уровень / тренд / волатильность значения - гипотеза "объём и траектория объясняют скидку"
# Сегментированы: отток (длинный ноль) не должен искажать эти метрики.
# -----------------------------------------------------------------------------

log_level:
  windows: [3, 12]
  segment: short_gap        # текущий масштаб vs годовой базовый уровень (лог-шкала, сравнима между колонками)

slope:
  windows: [3, 12]
  segment: short_gap        # краткосрочный vs долгосрочный тренд

accel:
  segment: short_gap        # ускоряется/тормозит ли динамика прямо сейчас (последняя точка)

growth_since_start:
  segment: short_gap        # совокупный рост с начала текущего сегмента активности (не с начала жизни)

distance_to_global_max:
  segment: short_gap        # насколько текущий уровень ниже пика ЭТОГО сегмента активности

rolling_cv:
  windows: [3, 12]
  segment: short_gap        # нормированная волатильность - сравнима между колонками разного масштаба

extreme_share:
  windows: [12]
  segment: short_gap        # доля/направление резких выбросов - гипотеза "промо-driven" поведения
